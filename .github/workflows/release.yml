name: Release smindex

on:
  workflow_dispatch:
    inputs:
      test:
        type: boolean
        default: true
        description: "Test release to test.pypi.org if true, else release to pypi.org"
      release_draft:
        type: boolean
        default: false
        description: "If true, create a draft release on GitHub, otherwise publish immediately."

run-name: Release smindex Package

env:
  TEST_PUBLISH: ${{ github.event.inputs.test }}
  DRAFT_RELEASE: ${{ github.event.inputs.release_draft }}

jobs:
  package:
    name: Build and Test Package
    uses: ./.github/workflows/package.yml
    with:
      run_tests: true
    secrets: inherit

  release:
    needs: package
    runs-on: ubuntu-latest
    name: Release Package
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Get Version from __init__.py
        id: get_version
        run: |
          ver="$(python3 -c "from get_version import get_version; print(get_version())")"
          tag="v$ver"
          echo "Version: $ver"
          echo "version=$tag" >> "$GITHUB_OUTPUT"
          echo "pkg=smindex-$ver-py3-none-any.whl" >> "$GITHUB_ENV"

      - name: Check if tag exists
        id: tag_check
        run: |
          tag="${{ steps.get_version.outputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
              echo "Tag $tag already exists"
              echo "exists=true" >> $GITHUB_OUTPUT
              exit 1
          else
              echo "Tag $tag does not exist"
              echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and Push Tag
        run: |
          tag="${{ steps.get_version.outputs.version }}"
          git tag "$tag"
          git push origin "$tag"

      - name: Download package artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: smindex-package
          path: smindex-package

      - name: Extract package to dist
        run: |
          mkdir -p dist
          mv smindex-package/* dist/
          ls -la dist

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e  # v1.1.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          release_name: "Release ${{ steps.get_version.outputs.version }}"
          draft: ${{ env.DRAFT_RELEASE == 'true' }}
          prerelease: false

      - name: Upload Package to Release
        uses: actions/upload-release-asset@e8f9f06c4b078e705bd2ea027f0926603fc9b4d5  # v1.0.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/${{ env.pkg }}
          asset_name: ${{ env.pkg }}
          asset_content_type: application/octet-stream

      - name: Publish Package to PyPI
        if: ${{ !inputs.test }} 
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
    
      - name: Publish Package to Test PyPI
        if: ${{ inputs.test }}
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository_url: https://test.pypi.org/legacy/

